<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Slime Run</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="game-container">
               <!-- Шапка -->
        <div class="game-header">
            <div class="player-greeting" id="playerGreeting"></div>
            <div class="score-board">
                <span class="score-item">🏆 <span id="score">0</span></span>
                <span class="score-item">⭐ <span id="highScore">0</span></span>
                <span class="score-item currency">🪙 <span id="coinsCount">0</span></span>
            </div>
            <!-- Кнопка выхода -->
           <div class="game-header">
    <div class="player-greeting" id="playerGreeting"></div>
    <div class="score-board">
        <span class="score-item">🏆 <span id="score">0</span></span>
        <span class="score-item">⭐ <span id="highScore">0</span></span>
        <span class="score-item currency">🪙 <span id="coinsCount">0</span></span>
    </div>
    <button id="exitBtn" class="exit-btn">✕</button>
</div>
        <!-- Canvas -->
        <canvas id="gameCanvas"></canvas>

        <!-- Инструкция -->
        <div class="overlay" id="instructionOverlay">
            <div class="overlay-card">
                <div class="slime-preview" id="menuSlime"></div>
                <h2>Slime Run</h2>
                <div class="tips">
                    <div class="tip">🐌 Слизень бежит сам</div>
                    <div class="tip">👆 Тап — прыжок</div>
                    <div class="tip">✌️ Два тапа — двойной прыжок</div>
                    <div class="tip">⏱ Долгий тап — высокий прыжок</div>
                    <div class="tip">🪙 Собирай монеты</div>
                    <div class="tip">🔥 Комбо × множитель очков</div>
                </div>
                <button class="tg-button" id="startGameBtn">▶ Начать игру</button>
                <button class="tg-button secondary" id="menuShopBtn">🛒 Магазин</button>
            </div>
        </div>

        <!-- Game Over -->
        <div class="overlay hidden" id="gameOverOverlay">
            <div class="overlay-card">
                <div class="game-over-emoji" id="gameOverEmoji">💀</div>
                <h2>Игра окончена!</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">Счёт</span>
                        <span class="stat-value" id="finalScore">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Рекорд</span>
                        <span class="stat-value" id="finalHighScore">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Заработано</span>
                        <span class="stat-value">🪙 <span id="earnedCoins">0</span></span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Макс. комбо</span>
                        <span class="stat-value">×<span id="maxCombo">1</span></span>
                    </div>
                </div>
                <div id="newRecordBadge" class="new-record hidden">🎉 Новый рекорд!</div>
                <button class="tg-button" id="restartGameBtn">🔄 Ещё раз</button>
                <button class="tg-button secondary" id="shopBtn">🛒 Магазин</button>
            </div>
        </div>

        <!-- Магазин -->
        <div class="overlay hidden" id="shopOverlay">
            <div class="overlay-card shop-card">
                <h2>🛒 Магазин</h2>
                <div class="player-currency">У тебя: <span id="shopCoins">0</span> 🪙</div>

                <div class="shop-tabs">
                    <button class="tab-btn active" data-tab="upgrades">⚡ Улучшения</button>
                    <button class="tab-btn" data-tab="skins">🎨 Скины</button>
                </div>

                <div class="tab-content" id="upgradesTab">
                    <div class="upgrade-items" id="upgradeItems"></div>
                </div>
                <div class="tab-content hidden" id="skinsTab">
                    <div class="skin-preview-wrap">
                        <canvas id="skinPreviewCanvas" width="80" height="80"></canvas>
                    </div>
                    <div class="upgrade-items" id="skinItems"></div>
                </div>

                <button class="tg-button secondary" id="closeShopBtn">✕ Закрыть</button>
            </div>
        </div>

        <!-- Комбо-индикатор -->
        <div class="combo-indicator hidden" id="comboIndicator">×<span id="comboMult">1</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
