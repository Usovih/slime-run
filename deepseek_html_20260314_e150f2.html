<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Slime Run</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="game-container">
        <!-- Шапка игры -->
        <div class="game-header">
            <div class="player-greeting" id="playerGreeting"></div>
            <div class="score-board">
                <span>Счет: <span id="score">0</span></span>
                <span>Рекорд: <span id="highScore">0</span></span>
                <span class="currency">🪙 <span id="coinsCount">0</span></span>
            </div>
        </div>

        <!-- Игровое поле -->
        <canvas id="gameCanvas"></canvas>

        <!-- Экран инструкции -->
        <div class="instruction-overlay" id="instructionOverlay">
            <div class="instruction-content">
                <h2>Slime Run</h2>
                <p>🐌 Слизень бежит автоматически</p>
                <p>👆 Нажми на экран, чтобы прыгнуть</p>
                <p>💪 Долгое нажатие = высокий прыжок</p>
                <p>🪙 Собирай монеты для улучшений</p>
                <p>✨ Покупай скины и способности в магазине</p>
                <button class="tg-button" id="startGameBtn">Начать игру</button>
            </div>
        </div>

        <!-- Экран окончания игры -->
        <div class="game-over-overlay" id="gameOverOverlay">
            <div class="game-over-content">
                <h2>Игра окончена!</h2>
                <p>Счет: <span id="finalScore">0</span></p>
                <p>Рекорд: <span id="finalHighScore">0</span></p>
                <p>Заработано: <span id="earnedCoins">0</span> 🪙</p>
                <div class="sad-slime">🥺</div>
                <button class="tg-button" id="restartGameBtn">Играть снова</button>
                <button class="tg-button secondary" id="shopBtn">Магазин</button>
            </div>
        </div>

        <!-- Магазин -->
        <div class="shop-overlay hidden" id="shopOverlay">
            <div class="shop-content">
                <h2>Магазин улучшений</h2>
                <div class="player-currency">
                    У тебя: <span id="shopCoins">0</span> 🪙
                </div>
                <div class="upgrade-items" id="upgradeItems">
                    <!-- Сюда будут добавляться предметы через JavaScript -->
                </div>
                <button class="tg-button" id="closeShopBtn">Закрыть</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
